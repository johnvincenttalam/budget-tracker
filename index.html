<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/budget-tracker/logo-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/budget-tracker/logo-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/budget-tracker/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/budget-tracker/logo-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Budget Tracker</title>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('budget-tracker-storage') || '{}');
        var t = (s.state && s.state.theme) || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#000000' : '#FFFFFF');
      } catch(e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    </script>
  </head>
  <body class="bg-slate-950 text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
